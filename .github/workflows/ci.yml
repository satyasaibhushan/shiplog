name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run typecheck

      - name: Build frontend
        run: bun run build

      - name: Verify dist output
        run: |
          test -f dist/web/main.js || (echo "Missing dist/web/main.js" && exit 1)
          test -f dist/web/styles.css || (echo "Missing dist/web/styles.css" && exit 1)
          echo "Build artifacts OK"
